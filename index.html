<!DOCTYPE html>
<html>

<head>

    <title>Language Translation Tool</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Language Translation Tool</h1>

        <form action="/translate" method="POST">

            <textarea
                name="text"
                rows="6"
                cols="60"
                placeholder="Enter text here"
                required></textarea>

            <br><br>

            <label><b>Source Language:</b></label>

            <select name="source">

                <option value="en">English</option>

                <option value="hi">Hindi</option>

                <option value="te">Telugu</option>

                <option value="fr">French</option>

                <option value="es">Spanish</option>

            </select>

            <br><br>

            <label><b>Target Language:</b></label>

            <select name="target">

                <option value="hi">Hindi</option>

                <option value="en">English</option>

                <option value="te">Telugu</option>

                <option value="fr">French</option>

                <option value="es">Spanish</option>

            </select>

            <br><br>

            <button type="submit">
                Translate
            </button>

        </form>

        {% if translated_text %}

        <h2>Translated Text</h2>

        <textarea
            id="output"
            rows="6"
            cols="60"
            readonly>{{ translated_text }}</textarea>

        <br><br>

        <button onclick="copyText()">
            Copy Translation
        </button>

        {% endif %}

    </div>

    <script>

        function copyText() {

            let copyField =
                document.getElementById("output");

            copyField.select();

            copyField.setSelectionRange(0, 99999);

            document.execCommand("copy");

            alert("Translation Copied Successfully!");

        }

    </script>

</body>

</html>
